<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width">

    <title>@TITLE@</title>

    <style type="text/css">
        body {
            font-family: sans-serif;
            font-size: small;
            background-color: #c6eafb;
        }

        hr {
            color: #00ADEF;
            background-color: #00ADEF;
            height: 6px;
            border: none;
            padding-left: 0px;
        }

        table {
            border-collapse: collapse;
            font-size: small;
        }

        th, td {
            padding: 2px;
            text-align: left;
        }

        table, th, td {
            border: 1px solid black;
        }

        th {
            background-color: #00ADEF;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #b6daeb;
        }

        a.nav-off {
            text-decoration: none;
            color: #FFFFFF;
        }

        a.nav-on {
            text-decoration: none;
            color: #FFFF00;
        }

        td.nav-off {
            text-decoration: none;
            background-color: #1a75bc;
            text-align: center;
        }

        td.nav-on {
            text-decoration: none;
            background-color: #00ADEF;
            text-align: center;
        }
    </style>


</head>
<body>
    @BODY@
</body>
</html>
