<script src="https://cdn.jsdelivr.net/npm/crc-32/crc32.min.js"></script>

<script type="text/javascript">

    const _path = document.location.pathname;

    const _defaultParamters = {
        search: '',
    };

    const _parameters = JSON.parse(JSON.stringify(_defaultParamters));

    const load = () => {
        if (window.location.href.includes('?')) {
            const parts = window.location.href.split('?')[1].split('&');
            parts.forEach((part) => {
                const pair = part.split('=');
                const key = pair[0];
                const value = decodeURIComponent(pair[1].trim());

                _parameters[key] = value;
            });
        }

        const input = document.getElementById('input');
        input.value = _parameters.search;
        input.focus();

        const fileInput = document.getElementById("fileInput");

        fileInput.addEventListener("change", async (event) => {
            const file = event.target.files[0];

            if (!file)
                return;

            try {
                const buffer = await file.arrayBuffer();
                const data = new Uint8Array(buffer);
                const crc = CRC32.buf(data) >>> 0;

                input.value = crc.toString(16).padStart(8, '0');
                search();
            } catch (err) {
                console.error(err);
            }
        });
    }

    const gotoLocation = () => {
        const partKeys = Object.keys(_parameters).filter((key) => {
            if (Array.isArray(_parameters[key]))
                return _parameters[key].length > 0;
            else 
                return _parameters[key] !== _defaultParamters[key];
        });

        const parts = [];

        partKeys.forEach(key => {
            const value = _parameters[key];
            if (Array.isArray(value))
                value.forEach(itemValue => parts.push(`${key}=${encodeURIComponent(itemValue)}`));
            else
                parts.push(`${key}=${encodeURIComponent(value)}`);
        });

        if (parts.length === 0)
            document.location = _path;
        else
            document.location = _path + '?' + parts.join('&');
    }

    const search = () => {
        _parameters['search'] = document.getElementById('input').value.trim();
        gotoLocation();
    }

    window.onload = load;

</script>

<h2>Search</h2>
<div class="toolbar-input">
    <input id="input" type="text" placeholder="machine, software, SHA1, CRC32, exact rom/disk name" />
    <button type="submit" onclick="search(); return false;">Search</button>
    or CRC32 in Browser<input type="file" id="fileInput" />
</div>
