<script type="text/javascript">

    const _path = document.location.pathname;

    const _defaultParamters = {
        offset: 0,
        limit: 250,
        search: '',
        view: 'grid',
        type: [],
    };

    const _parameters = { ..._defaultParamters, type: [..._defaultParamters.type], };

    // TODO : make better
    const _machine_types = [
        'arcade',
        'software',
        'pinball',
        'gamble',
        'other',
        'device',
    ];

    const load = () => {
        if (window.location.href.includes('?')) {
            const parts = window.location.href.split('?')[1].split('&');
            parts.forEach((part) => {
                const pair = part.split('=');
                const key = pair[0];
                const value = decodeURIComponent(pair[1]);

                switch (key) {
                    case 'offset':
                        _parameters[key] = parseInt(value, 10);
                        break;

                    case 'search':
                    case 'view':
                        _parameters[key] = value;
                        break;

                    case 'type':
                        if (_machine_types.includes(value) && !_parameters.type.includes(value))
                            _parameters.type.push(value);
                        break;
                }
            });
        }

        const inputText = document.getElementById('inputText');
        inputText.value = _parameters.search;
        inputText.focus();

        if (_parameters.type.length === 0)
            document.getElementById("type-all").checked = true;
        else
            _parameters.type.forEach(type => document.getElementById(`type-${type}`).checked = true);

        switch (_parameters['view']) {
            case 'list':
                document.getElementById("view-list").checked = true;
                break;
            default:
                document.getElementById("view-grid").checked = true;
                _parameters['view'] = 'grid';
                break;
        }
    }

    const gotoLocation = () => {
        const partKeys = Object.keys(_parameters).filter((key) => {
            if (Array.isArray(_parameters[key]))
                return _parameters[key].length > 0;
            else 
                return _parameters[key] !== _defaultParamters[key];
        });

        const parts = [];

        partKeys.forEach(key => {
            const value = _parameters[key];
            if (Array.isArray(value))
                value.forEach(itemValue => parts.push(`${key}=${encodeURIComponent(itemValue)}`));
            else
                parts.push(`${key}=${encodeURIComponent(value)}`);
        });

        if (parts.length === 0)
            document.location = _path;
        else
            document.location = _path + '?' + parts.join('&');
    }

    const searchButton = () => {
        _parameters['search'] = document.getElementById('inputText').value;
        _parameters['offset'] = 0;
        gotoLocation();
    }

    const changeView = (input) => {
        _parameters['view'] = input.value;
        gotoLocation();
    }

    const changeType = (input) => {
        _parameters.type = [];
        if (input.value !== 'all')
            _parameters.type.push(input.value);
        _parameters['offset'] = 0;
        gotoLocation();
    }

    window.onload = load;

</script>

<div class="toolbar-input">
    <div>
        <input id="inputText" type="text" style="width:480px;" />
        <button type="submit" onclick="searchButton(); return false;">Search</button>
    </div>
    <div>
        <label><input id="type-arcade" type="radio" name="type" value="arcade" onchange="changeType(this);">arcade</label>
        <label><input id="type-software" type="radio" name="type" value="software" onchange="changeType(this);">software</label>
        <label><input id="type-pinball" type="radio" name="type" value="pinball" onchange="changeType(this);">pinball</label>
        <label><input id="type-gamble" type="radio" name="type" value="gamble" onchange="changeType(this);">gamble</label>
        <label><input id="type-other" type="radio" name="type" value="other" onchange="changeType(this);">other</label>
        <label><input id="type-device" type="radio" name="type" value="device" onchange="changeType(this);">device</label>
        <label><input id="type-all" type="radio" name="type" value="all" onchange="changeType(this);">all</label>
    </div>
</div>
<hr />
<div class="toolbar">
    @TOP@
    &bull;
    <div>
        <label><input id="view-grid" type="radio" name="view" value="grid" onchange="changeView(this);">grid</label>
        <label><input id="view-list" type="radio" name="view" value="list" onchange="changeView(this);">list</label>
    </div>
</div>
<hr />
@DATA@
<hr />
<div class="toolbar">
    @BOTTOM@
</div>
